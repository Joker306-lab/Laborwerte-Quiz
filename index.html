<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Joker Quiz</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
  padding: 0;
}
.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 14px 28px;
}
.hidden {
  display: none;
}
.header {
  text-align: center;
  margin-top: 6px;
}
.logo {
  width: 110px;
  max-width: 34vw;
  height: auto;
  display: block;
  margin: 10px auto 10px;
}
.card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
  margin-top: 18px;
}
.grid {
  display: grid;
  gap: 12px;
}
@media (min-width: 760px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
.big-btn, .answer-btn, .nav-btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 18px;
  cursor: pointer;
}
.big-btn {
  background: #fff;
  color: #111;
  text-align: left;
}
.big-btn.disabled {
  background: #2b2b2b;
  color: #999;
  cursor: default;
}
.meta {
  margin: 14px 0;
  font-size: 17px;
  color: #ddd;
  text-align: center;
}
#frage {
  font-size: 26px;
  font-weight: bold;
  margin: 18px 0;
  text-align: center;
  line-height: 1.35;
}
.answer-btn {
  background: #fff;
  color: #111;
  margin: 10px 0;
}
.answer-btn.correct {
  background: #1f9d55;
  color: white;
}
.answer-btn.wrong {
  background: #c53030;
  color: white;
}
.answer-btn.disabled {
  opacity: 0.95;
  cursor: default;
}
#feedback {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
  font-weight: bold;
}
#explanation {
  margin-top: 10px;
  padding: 10px;
  font-size: 15px;
  background: #222;
  border-radius: 10px;
  text-align: center;
  color: #ddd;
  line-height: 1.45;
  min-height: 24px;
}
#timer {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
  font-weight: bold;
}
.nav-btn {
  background: #2563eb;
  color: white;
  margin-top: 14px;
}
.nav-btn.secondary {
  background: #444;
}
.small {
  color: #bbb;
  font-size: 15px;
  margin-top: 12px;
  line-height: 1.4;
  text-align: center;
}
#result {
  font-size: 21px;
  line-height: 1.6;
  text-align: center;
}
.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: #262626;
  color: #ddd;
  font-size: 14px;
}
.result-title {
  font-size: 30px;
  margin: 8px 0 0;
}
</style>
</head>
<body>

<script>
const modules = {
  labor: {
    title: "Laborwerte",
    time: 15,
    questions: [
      {
        frage: "Welches Röhrchen wird für das kleine Blutbild verwendet?",
        antworten: ["EDTA-Röhrchen", "Citrat-Röhrchen", "Lithium-Heparin-Röhrchen", "BGA-Röhrchen"],
        richtig: 0,
        erklaerung: "Das kleine Blutbild wird standardmäßig im EDTA-Röhrchen abgenommen, da EDTA die Gerinnung hemmt und die Zellstrukturen stabilisiert."
      },
      {
        frage: "Welches Röhrchen wird für die Gerinnung verwendet?",
        antworten: ["EDTA-Röhrchen", "Citrat-Röhrchen", "Lithium-Heparin-Röhrchen", "BGA-Röhrchen"],
        richtig: 1,
        erklaerung: "Gerinnungsparameter werden im Citrat-Röhrchen bestimmt, da Citrat Calcium bindet und die Gerinnung kontrolliert beeinflusst."
      },
      {
        frage: "Welches Röhrchen wird für die klinische Chemie verwendet?",

        richtig: 2,
        erklaerung: "Parameter der klinischen Chemie werden im Lithium-Heparin-Röhrchen bestimmt, da Heparin die Gerinnung verhindert und Plasma für Analysen bereitstellt."
      },
      {
        frage: "Welches Röhrchen wird für Blutgase verwendet?",
        antworten: ["EDTA-Röhrchen", "Citrat-Röhrchen", "Lithium-Heparin-Röhrchen", "BGA-Röhrchen"],
        richtig: 3,
        erklaerung: "Blutgase werden aus speziell vorbereiteten BGA-Röhrchen analysiert, um Veränderungen von pH, pO2 und pCO2 korrekt zu erfassen."
      },
      {
        frage: "Welcher Normalwertbereich passt zu Leukozyten?",

        richtig: 0,
        erklaerung: "Leukozyten liegen physiologisch im Bereich von 4000 bis 10000 pro µl und sind zentral für die Immunabwehr."
      },
      {
        frage: "Welcher Normalwertbereich passt zu Thrombozyten?",

      },
      {
        frage: "Welcher Hämatokrit-Normalwert passt bei Frauen?",

let activeModuleKey = null;
let aktiveFragen = [];
let falschBeantwortet = [];
let index = 0;
let punktzahl = 0;
let timer = null;
let zeit = 15;
let beantwortet = false;
let gesamtGestellt = 0;
let firstRoundCount = 0;

function show(id) {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function startModule(key) {
  const mod = modules[key];
  if (!mod || !mod.questions.length) return;

  activeModuleKey = key;
  aktiveFragen = [...mod.questions];
  falschBeantwortet = [];
  index = 0;
  punktzahl = 0;
  gesamtGestellt = 0;
  firstRoundCount = aktiveFragen.length;
  document.getElementById("moduleBadge").innerText = mod.title;
  show("quizScreen");
  zeigeFrage();
}

function updateProgress() {
  document.getElementById("progress").innerText =
    "Direkt richtig: " + punktzahl + " von " + firstRoundCount +
    " | Aktuelle Runde: Frage " + (index + 1) + " von " + aktiveFragen.length;
}

function zeigeFrage() {
  if (index >= aktiveFragen.length) {
    if (falschBeantwortet.length > 0) {
      aktiveFragen = [...falschBeantwortet];
      falschBeantwortet = [];
      index = 0;
      alert("Jetzt kommen die falsch beantworteten Fragen erneut.");
    } else {
      quizBeenden();
      return;
    }
  }

  beantwortet = false;
  zeit = modules[activeModuleKey].time;
  clearInterval(timer);
  gesamtGestellt++;

  document.getElementById("feedback").innerText = "";
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  const frageObj = aktiveFragen[index];
  document.getElementById("frage").innerText = frageObj.frage;

  const antwortenBox = document.getElementById("antworten");
  antwortenBox.innerHTML = "";

  frageObj.antworten.forEach((antwort, i) => {
    const btn = document.createElement("button");
    btn.innerText = antwort;
    btn.className = "answer-btn";
    btn.onclick = () => pruefeAntwort(i);
    antwortenBox.appendChild(btn);
  });

  document.getElementById("timer").innerText = "Zeit: " + zeit;
  updateProgress();

  timer = setInterval(() => {
    zeit--;
    document.getElementById("timer").innerText = "Zeit: " + zeit;
    if (zeit <= 0) {
      clearInterval(timer);
      zeitAbgelaufen();
    }
  }, 1000);
}

function pruefeAntwort(auswahl) {
  if (beantwortet) return;
  beantwortet = true;
  clearInterval(timer);

  const frageObj = aktiveFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  if (auswahl === frageObj.richtig) {
    document.getElementById("feedback").innerText = "Richtig";
    punktzahl++;
  } else {
    buttons[auswahl].classList.add("wrong");
    document.getElementById("feedback").innerText = "Falsch";
    falschBeantwortet.push(frageObj);
  }

  document.getElementById("explanation").innerText =
    "Richtige Antwort: " + frageObj.antworten[frageObj.richtig] + ". " + (frageObj.erklaerung || "");

  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function zeitAbgelaufen() {
  if (beantwortet) return;
  beantwortet = true;

  const frageObj = aktiveFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  document.getElementById("feedback").innerText = "Zeit abgelaufen";
  document.getElementById("explanation").innerText =
    "Richtige Antwort: " + frageObj.antworten[frageObj.richtig] + ". " + (frageObj.erklaerung || "");

  falschBeantwortet.push(frageObj);
  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  index++;
  zeigeFrage();
}

function quizBeenden() {
  clearInterval(timer);
  const result = document.getElementById("result");
  const prozent = Math.round((punktzahl / firstRoundCount) * 100);

  result.innerHTML =
    "<p>Modul: <strong>" + modules[activeModuleKey].title + "</strong></p>" +
    "<p>Direkt richtig beantwortet: " + punktzahl + " von " + firstRoundCount + "</p>" +
    "<p>Ergebnis im ersten Durchgang: " + prozent + " Prozent</p>" +
    "<p>Insgesamt gestellte Fragen inklusive Wiederholungen: " + gesamtGestellt + "</p>" +
    "<p>Alle falsch beantworteten Fragen wurden wiederholt, bis sie richtig beantwortet waren.</p>";

  show("resultScreen");
}

function restartCurrentModule() {
  if (!activeModuleKey) {
    show("startScreen");
    return;
  }
  startModule(activeModuleKey);
}

function goHome() {
  clearInterval(timer);
  show("startScreen");
}
</script>
