<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joker Quiz</title>
<style>
body {font-family: Arial;background:#111;color:#fff;margin:0}
.app {max-width:900px;margin:auto;padding:16px}
.header {text-align:center}
.logo {width:110px;margin:10px auto;display:block}
.card {background:#1a1a1a;padding:16px;border-radius:12px;margin-top:16px}
button {padding:14px;border:none;border-radius:10px;font-size:16px;margin:6px 0;width:100%}
.big-btn {background:#fff;color:#111}
.answer-btn {background:#fff;color:#111}
.correct {background:#1f9d55;color:#fff}
.wrong {background:#c53030;color:#fff}
.nav-btn {background:#2563eb;color:#fff}
.secondary {background:#444}
#frage {font-size:22px;text-align:center;margin:14px 0}
#feedback {text-align:center;font-weight:bold;margin-top:10px}
#timer {text-align:center;margin-top:10px}
.joker-btn {background:#d4af37;color:#111;font-weight:bold}
.used {background:#555;color:#aaa}
</style>
</head>
<body>
<div class="app">

<div id="start">
<div class="header">
<img class="logo" src="jokerhut.jpg">
</div>

<div class="card">
<button class="big-btn" onclick="start()">Laborwerte starten</button>
</div>
</div>

<div id="quiz" style="display:none">
<div class="header">
<img class="logo" src="jokerhut.jpg">
</div>

<div class="card">
<div id="frage"></div>
<div id="answers"></div>

<button id="joker" class="joker-btn" onclick="useJoker()">Joker einsetzen</button>

<div id="feedback"></div>
<div id="timer"></div>

<button id="next" class="nav-btn" style="display:none" onclick="next()">Weiter</button>
<button class="secondary" onclick="home()">Zurück</button>
</div>
</div>

<div id="result" style="display:none">
<div class="header">
<img class="logo" src="jokerhut.jpg">
</div>
<div class="card">
<div id="resultText"></div>
<button onclick="start()">Nochmal</button>
<button class="secondary" onclick="home()">Zurück</button>
</div>
</div>

</div>

<script>

const baseQuestions = [
{q:["Welches Röhrchen für kleines Blutbild?","Blutbild → welches Röhrchen?"],a:["EDTA","Citrat","Heparin","BGA"],c:0},
{q:["Welches Röhrchen für Gerinnung?","Gerinnung → welches Röhrchen?"],a:["EDTA","Citrat","Heparin","BGA"],c:1},
{q:["Leukozyten normal?"],a:["4000-10000","150000-400000","55-130","0.9-1.1"],c:0},
{q:["Thrombozyten normal?"],a:["4000-10000","150000-400000","96-110","20-40"],c:1},
{q:["Hb Frau?"],a:["12-16","14-18","37-54","0.3-3.5"],c:0},
{q:["Hb Mann?"],a:["12-16","14-18","37-47","4.4-6"],c:1}
];

let questions = [];
let wrong = [];
let index = 0;
let score = 0;
let timer;
let time = 25;
let jokerUsed = false;

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function prepare(){
questions = shuffle(baseQuestions).map(q=>{
let answers = q.a.map((t,i)=>({t,i}));
answers = shuffle(answers);
return {
q: q.q[Math.floor(Math.random()*q.q.length)],
a: answers.map(x=>x.t),
c: answers.findIndex(x=>x.i===q.c)
};
});
}

function start(){
prepare();
wrong=[];
index=0;
score=0;
jokerUsed=false;
document.getElementById("joker").classList.remove("used");
show("quiz");
load();
}

function show(id){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="none";
document.getElementById(id).style.display="block";
}

function load(){
if(index>=questions.length){
if(wrong.length){
questions=shuffle(wrong);
wrong=[];
index=0;
alert("Falsche Fragen kommen nochmal.");
}else{
finish();
return;
}
}

time=25;
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Zeit: "+time;
if(time<=0){clearInterval(timer);timeout();}
},1000);

let q=questions[index];
document.getElementById("frage").innerText=q.q;

let box=document.getElementById("answers");
box.innerHTML="";
q.a.forEach((a,i)=>{
let b=document.createElement("button");
b.innerText=a;
b.className="answer-btn";
b.onclick=()=>answer(i);
box.appendChild(b);
});

document.getElementById("feedback").innerText="";
document.getElementById("next").style.display="none";
}

function answer(i){
clearInterval(timer);
let q=questions[index];
let buttons=document.querySelectorAll(".answer-btn");

buttons.forEach((b,idx)=>{
if(idx===q.c)b.classList.add("correct");
else if(idx===i)b.classList.add("wrong");
b.disabled=true;
});

if(i===q.c){score++}
else{wrong.push(q)}

document.getElementById("feedback").innerText=i===q.c?"Richtig":"Falsch";
document.getElementById("next").style.display="block";
}

function timeout(){
let q=questions[index];
wrong.push(q);
document.getElementById("feedback").innerText="Zeit abgelaufen";
document.getElementById("next").style.display="block";
}

function next(){
index++;
load();
}

function finish(){
show("result");
document.getElementById("resultText").innerText="Richtig: "+score+" von "+baseQuestions.length;
}

function home(){
clearInterval(timer);
show("start");
}

function useJoker(){
if(jokerUsed)return;

let q=questions[index];
let buttons=[...document.querySelectorAll(".answer-btn")];

let wrongButtons=buttons.filter((b,i)=>i!==q.c);
let remove=wrongButtons[Math.floor(Math.random()*wrongButtons.length)];
remove.style.display="none";

jokerUsed=true;
document.getElementById("joker").classList.add("used");
}

</script>

</body>
</html>
