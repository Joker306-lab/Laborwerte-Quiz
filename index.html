<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joker Quiz</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
.app { max-width:900px; margin:auto; padding:15px; }
.hidden { display:none; }

.big-btn, .answer-btn, .nav-btn, .joker-btn {
width:100%; padding:15px; margin:8px 0;
border:none; border-radius:10px; font-size:18px;
}

.big-btn { background:#fff; color:#000; text-align:left; }
.answer-btn { background:#fff; color:#000; }
.answer-btn.correct { background:#1f9d55; color:#fff; }
.answer-btn.wrong { background:#c53030; color:#fff; }
.nav-btn { background:#2563eb; color:#fff; }
.joker-btn { background:#d4af37; color:#000; }

#frage { font-size:24px; margin:20px 0; text-align:center; }
#timer { text-align:center; margin-top:10px; }
</style>
</head>

<body>
<div class="app">

<section id="startScreen">
<h2>Joker Quiz</h2>

<button class="big-btn" onclick="startModule('ekg')">EKG Kurs</button>
<button class="big-btn" onclick="startModule('ludwig')">Dr. Ludwig – Anästhesie</button>

</section>

<section id="quizScreen" class="hidden">
<div id="frage"></div>
<div id="antworten"></div>
<button id="jokerBtn" class="joker-btn" onclick="joker()">Joker</button>
<div id="feedback"></div>
<button id="nextBtn" class="nav-btn hidden" onclick="next()">Weiter</button>
<div id="timer"></div>
</section>

</div>

<script>

const modules = {

ekg: {
time:25,
questions:[
{frage:"Welcher Rhythmus liegt vor?", antworten:["Sinusrhythmus","VHF","VT","AV Block"], richtig:0}
]
},

ludwig: {
time:25,
questions:[

{frage:"Was hat beim Polytrauma absolute Priorität?", antworten:["Atemweg sichern","EKG schreiben","Blut abnehmen","Anamnese"], richtig:0},

{frage:"Wann wird ein Patient als kritisch eingestuft?", antworten:["Wenn Vitalfunktionen bedroht sind","Wenn Schmerzen bestehen","Wenn Fieber besteht","Wenn Übelkeit vorliegt"], richtig:0},

{frage:"Was ist typisch für den internistischen Notfallpatienten?", antworten:["Multimorbidität","Nur Trauma","Nur junge Patienten","Nur chirurgisch"], richtig:0},

{frage:"Welche Maßnahme steht bei Ateminsuffizienz im Vordergrund?", antworten:["Sauerstoffgabe","Blutabnahme","Röntgen","EKG"], richtig:0},

{frage:"Was ist ein Zeichen für Schock?", antworten:["Kalte, blasse Haut","Warme Haut","Rote Haut","Schwitzen nur"], richtig:0},

{frage:"Was ist entscheidend im ABCDE Schema?", antworten:["Prioritäten setzen","Alles gleichzeitig machen","Nur Medikamente geben","Nur Diagnostik"], richtig:0},

{frage:"Was ist bei Polytrauma wichtig?", antworten:["Schnelle strukturierte Versorgung","Langsame Diagnostik","Nur Laborwerte","Nur Beobachtung"], richtig:0},

{frage:"Welche Rolle hat die Anästhesie?", antworten:["Sicherung der Vitalfunktionen","Nur Schmerztherapie","Nur Dokumentation","Keine Rolle"], richtig:0},

{frage:"Was ist bei instabilem Patienten entscheidend?", antworten:["Sofort handeln","Abwarten","Labor abwarten","Röntgen zuerst"], richtig:0},

{frage:"Was ist ein Leitsymptom bei internistischen Notfällen?", antworten:["Dyspnoe","Nur Schmerzen","Nur Fieber","Nur Schwindel"], richtig:0}

]
}

};

let active;
let index=0;
let score=0;
let timer;
let timeLeft;

function startModule(key){
active = modules[key];
index=0;
score=0;
show("quizScreen");
nextQuestion();
}

function show(id){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

function nextQuestion(){

if(index>=active.questions.length){
alert("Fertig. Score: "+score+"/"+active.questions.length);
location.reload();
return;
}

const q = active.questions[index];
document.getElementById("frage").innerText = q.frage;

const box = document.getElementById("antworten");
box.innerHTML="";

q.antworten.forEach((a,i)=>{
const btn=document.createElement("button");
btn.innerText=a;
btn.className="answer-btn";
btn.onclick=()=>answer(i);
box.appendChild(btn);
});

timeLeft = active.time;
startTimer();
}

function answer(i){

clearInterval(timer);
const q = active.questions[index];
const buttons=document.querySelectorAll(".answer-btn");

buttons.forEach((b,idx)=>{
if(idx===q.richtig) b.classList.add("correct");
if(idx===i && i!==q.richtig) b.classList.add("wrong");
b.disabled=true;
});

if(i===q.richtig) score++;

document.getElementById("nextBtn").classList.remove("hidden");
}

function next(){
index++;
document.getElementById("nextBtn").classList.add("hidden");
nextQuestion();
}

function startTimer(){
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="Zeit: "+timeLeft;
if(timeLeft<=0){
clearInterval(timer);
index++;
nextQuestion();
}
},1000);
}

function joker(){
const q = active.questions[index];
const buttons=[...document.querySelectorAll(".answer-btn")];
const wrong = buttons.filter((b,i)=>i!==q.richtig);
if(wrong.length){
wrong[Math.floor(Math.random()*wrong.length)].style.display="none";
}
}

</script>
</body>
</html>
