<title>Joker Quiz</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
  padding: 0;
}
.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 14px 28px;
}
.hidden {
  display: none;
}
.header {
  text-align: center;
  margin-top: 6px;
}
.logo {
  width: 120px;
  max-width: 38vw;
  height: auto;
  display: block;
  margin: 10px auto 10px;
}
.card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
  margin-top: 18px;
}
.grid {
  display: grid;
  gap: 12px;
}
@media (min-width: 760px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
.big-btn, .answer-btn, .nav-btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 18px;
  cursor: pointer;
}
.big-btn {
  background: #fff;
  color: #111;
  text-align: left;
}
.big-btn.disabled {
  background: #2b2b2b;
  color: #999;
  cursor: default;
}
.meta {
  margin: 14px 0;
  font-size: 17px;
  color: #ddd;
  text-align: center;
}
#frage {
  font-size: 26px;
  font-weight: bold;
  margin: 18px 0;
  text-align: center;
  line-height: 1.35;
}
.answer-btn {
  background: #fff;
  color: #111;
  margin: 10px 0;
}
.answer-btn.correct {
  background: #1f9d55;
  color: white;
}
.answer-btn.wrong {
  background: #c53030;
  color: white;
}
.answer-btn.disabled {
  opacity: 0.95;
  cursor: default;
}
#feedback {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
  font-weight: bold;
  min-height: 24px;
}
#timer {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
  font-weight: bold;
}
.nav-btn {
  background: #2563eb;
  color: white;
  margin-top: 14px;
}
.nav-btn.secondary {
  background: #444;
}
.small {
  color: #bbb;
  font-size: 15px;
  margin-top: 12px;
  line-height: 1.4;
  text-align: center;
}
#result {
  font-size: 21px;
  line-height: 1.6;
  text-align: center;
}
.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: #262626;
  color: #ddd;
  font-size: 14px;
}
.result-title {
  font-size: 30px;
  margin: 8px 0 0;
}
</style>

const modules = {
  labor: {
    title: "Laborwerte",
    time: 25,
    questions: originalQuestions
  },
  medikamente: {
    title: "Medikamente",
    time: 25,
    questions: []
  },
  algorithmus: {
    title: "Algorithmus",
    time: 25,
    questions: []
  },
  krankheitsbilder: {
    title: "Krankheitsbilder",
    time: 25,
    questions: []
  }
};

let activeModuleKey = null;
let aktiveFragen = [];
let falschBeantwortet = [];
let index = 0;
let punktzahl = 0;
let timer = null;
let zeit = 25;
let beantwortet = false;
let gesamtGestellt = 0;
let firstRoundCount = 0;

function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function prepareQuestions(questionList) {
  const shuffledQuestions = shuffleArray(questionList);
  return shuffledQuestions.map(q => {
    const options = q.antworten.map((text, idx) => ({
      text,
      originalIndex: idx
    }));
    const mixedOptions = shuffleArray(options);
    const newCorrectIndex = mixedOptions.findIndex(opt => opt.originalIndex === q.richtig);

    return {
      frage: q.frage,
      antworten: mixedOptions.map(opt => opt.text),
      richtig: newCorrectIndex
    };
  });
}

function show(id) {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function startModule(key) {
  const mod = modules[key];
  if (!mod || !mod.questions.length) return;

  activeModuleKey = key;
  aktiveFragen = prepareQuestions(mod.questions);
  falschBeantwortet = [];
  index = 0;
  punktzahl = 0;
  gesamtGestellt = 0;
  firstRoundCount = aktiveFragen.length;
  document.getElementById("moduleBadge").innerText = mod.title;
  show("quizScreen");
  zeigeFrage();
}

function updateProgress() {
  document.getElementById("progress").innerText =
    "Direkt richtig: " + punktzahl + " von " + firstRoundCount +
    " | Aktuelle Runde: Frage " + (index + 1) + " von " + aktiveFragen.length;
}

function zeigeFrage() {
  if (index >= aktiveFragen.length) {
    if (falschBeantwortet.length > 0) {
      aktiveFragen = shuffleArray([...falschBeantwortet]);
      falschBeantwortet = [];
      index = 0;
      alert("Jetzt kommen die noch nicht sicheren Fragen erneut.");
    } else {
      quizBeenden();
      return;
    }
  }

  beantwortet = false;
  zeit = modules[activeModuleKey].time;
  clearInterval(timer);
  gesamtGestellt++;

  document.getElementById("feedback").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  const frageObj = aktiveFragen[index];
  document.getElementById("frage").innerText = frageObj.frage;

  const antwortenBox = document.getElementById("antworten");
  antwortenBox.innerHTML = "";

  frageObj.antworten.forEach((antwort, i) => {
    const btn = document.createElement("button");
    btn.innerText = antwort;
    btn.className = "answer-btn";
    btn.onclick = () => pruefeAntwort(i);
    antwortenBox.appendChild(btn);
  });

  document.getElementById("timer").innerText = "Zeit: " + zeit;
  updateProgress();

  timer = setInterval(() => {
    zeit--;
    document.getElementById("timer").innerText = "Zeit: " + zeit;
    if (zeit <= 0) {
      clearInterval(timer);
      zeitAbgelaufen();
    }
  }, 1000);
}

function pruefeAntwort(auswahl) {
  if (beantwortet) return;
  beantwortet = true;
  clearInterval(timer);

  const frageObj = aktiveFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  if (auswahl === frageObj.richtig) {
    document.getElementById("feedback").innerText = "Richtig";
    punktzahl++;
  } else {
    buttons[auswahl].classList.add("wrong");
    document.getElementById("feedback").innerText = "Falsch";
    falschBeantwortet.push(frageObj);
  }

  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function zeitAbgelaufen() {
  if (beantwortet) return;
  beantwortet = true;

  const frageObj = aktiveFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  document.getElementById("feedback").innerText = "Zeit abgelaufen";
  falschBeantwortet.push(frageObj);
  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  index++;
  zeigeFrage();
}

function quizBeenden() {
  clearInterval(timer);
  const result = document.getElementById("result");
  const prozent = Math.round((punktzahl / firstRoundCount) * 100);

  result.innerHTML =
    "<p>Modul: <strong>" + modules[activeModuleKey].title + "</strong></p>" +
    "<p>Direkt richtig beantwortet: " + punktzahl + " von " + firstRoundCount + "</p>" +
    "<p>Ergebnis im ersten Durchgang: " + prozent + " Prozent</p>" +
    "<p>Insgesamt gestellte Fragen inklusive Wiederholungen: " + gesamtGestellt + "</p>" +
    "<p>Fragenfolge und Antwortreihenfolge werden bei jedem Neustart neu gemischt.</p>";

  show("resultScreen");
}

function restartCurrentModule() {
  if (!activeModuleKey) {
    show("startScreen");
    return;
  }
  startModule(activeModuleKey);
}

function goHome() {
  clearInterval(timer);
  show("startScreen");
}
