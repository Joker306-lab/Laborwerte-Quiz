<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Joker Quiz</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  margin: 0;
  padding: 0;
}
.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 14px 28px;
}
.hidden {
  display: none;
}
.header {
  text-align: center;
  margin-top: 6px;
}
.logo {
  width: 110px;
  max-width: 34vw;
  height: auto;
  display: block;
  margin: 10px auto 10px;
  border-radius: 18px;
}
.card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
  margin-top: 18px;
}
.grid {
  display: grid;
  gap: 12px;
}
@media (min-width: 760px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
.big-btn, .answer-btn, .nav-btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 18px;
  cursor: pointer;
}
.big-btn {
  background: #fff;
  color: #111;
  text-align: left;
}
.big-btn.disabled {
  background: #2b2b2b;
  color: #999;
  cursor: default;
}
.meta {
  margin: 14px 0;
  font-size: 17px;
  color: #ddd;
  text-align: center;
}
#frage {
  font-size: 26px;
  font-weight: bold;
  margin: 18px 0;
  text-align: center;
}
.answer-btn {
  background: #fff;
  color: #111;
  margin: 10px 0;
}
.answer-btn.correct {
  background: #1f9d55;
  color: white;
}
.answer-btn.wrong {
  background: #c53030;
  color: white;
}
#feedback {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
}
#explanation {
  margin-top: 10px;
  padding: 10px;
  font-size: 15px;
  background: #222;
  border-radius: 10px;
  text-align: center;
}
#timer {
  margin-top: 14px;
  font-size: 18px;
  text-align: center;
}
.nav-btn {
  background: #2563eb;
  color: white;
  margin-top: 14px;
}
.nav-btn.secondary {
  background: #444;
}
</style>
</head>

<body>
<div class="app">

<section id="startScreen">
  <div class="header">
    <img src="joker.webp" class="logo">
  </div>

  <div class="card">
    <div class="grid">
      <button class="big-btn" onclick="startQuiz()">Laborwerte</button>
      <button class="big-btn disabled">Medikamente</button>
      <button class="big-btn disabled">Algorithmus</button>
      <button class="big-btn disabled">Krankheitsbilder</button>
    </div>
  </div>
</section>

<section id="quizScreen" class="hidden">
  <div class="card">
    <div id="frage"></div>
    <div id="antworten"></div>
    <div id="feedback"></div>
    <div id="explanation"></div>
    <div id="timer"></div>
    <button onclick="nextQuestion()" class="nav-btn">Weiter</button>
  </div>
</section>

</div>

<script>
let fragen = [
{
frage: "Welches Röhrchen wird für das kleine Blutbild verwendet?",
antworten: ["EDTA", "Citrat", "Heparin", "BGA"],
richtig: 0,
erklaerung: "Das kleine Blutbild wird im EDTA-Röhrchen bestimmt, da EDTA die Gerinnung hemmt und Zellstrukturen stabil hält."
},
{
frage: "Welches Röhrchen wird für die Gerinnung verwendet?",
antworten: ["EDTA", "Citrat", "Heparin", "BGA"],
richtig: 1,
erklaerung: "Gerinnungsdiagnostik erfolgt im Citrat-Röhrchen, da Calcium gebunden wird und die Gerinnung kontrolliert abläuft."
},
{
frage: "Welcher Hb-Wert ist bei Frauen normal?",
antworten: ["12–16 g/dl", "14–18 g/dl", "9–12 g/dl", "18–22 g/dl"],
richtig: 0,
erklaerung: "Der physiologische Hämoglobinwert bei Frauen liegt zwischen 12 und 16 g/dl."
},
{
frage: "Welcher Kaliumwert ist normal?",
antworten: ["3,6–5,5 mmol/l", "2,0–3,0 mmol/l", "5,5–7,0 mmol/l", "1,0–2,0 mmol/l"],
richtig: 0,
erklaerung: "Kalium liegt physiologisch zwischen 3,6 und 5,5 mmol/l und ist entscheidend für die Erregungsleitung."
},
{
frage: "Welcher Natriumwert ist normal?",
antworten: ["135–145 mmol/l", "100–120 mmol/l", "150–170 mmol/l", "120–130 mmol/l"],
richtig: 0,
erklaerung: "Natrium liegt im Normbereich zwischen 135 und 145 mmol/l und reguliert den Wasserhaushalt."
},
{
frage: "Welcher CRP-Wert ist normal?",
antworten: ["< 6 mg/l", "< 50 mg/l", "< 100 mg/l", "< 1 mg/l"],
richtig: 0,
erklaerung: "CRP liegt physiologisch unter 6 mg/l und steigt bei Entzündungen an."
},
{
frage: "Welcher pH-Wert ist arteriell normal?",
antworten: ["7,35–7,45", "6,8–7,0", "7,5–7,7", "6,5–6,8"],
richtig: 0,
erklaerung: "Der arterielle pH-Wert liegt physiologisch zwischen 7,35 und 7,45."
},
{
frage: "Welcher Kreatininwert ist normal?",
antworten: ["0,6–1,1 mg/dl", "2–4 mg/dl", "4–6 mg/dl", "10 mg/dl"],
richtig: 0,
erklaerung: "Kreatinin liegt physiologisch zwischen 0,6 und 1,1 mg/dl und dient als Marker der Nierenfunktion."
}
];

let index = 0;

function startQuiz(){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");
zeigeFrage();
}

function zeigeFrage(){
let f = fragen[index];
document.getElementById("frage").innerText = f.frage;

let box = document.getElementById("antworten");
box.innerHTML = "";

f.antworten.forEach((a,i)=>{
let btn = document.createElement("button");
btn.innerText = a;
btn.className="answer-btn";
btn.onclick=()=>check(i);
box.appendChild(btn);
});
}

function check(i){
let f = fragen[index];

if(i===f.richtig){
document.getElementById("feedback").innerText="Richtig";
}else{
document.getElementById("feedback").innerText="Falsch";
}

document.getElementById("explanation").innerText = f.erklaerung;
}

function nextQuestion(){
index++;
if(index>=fragen.length){index=0;}
zeigeFrage();
}
</script>

</body>
</html>
