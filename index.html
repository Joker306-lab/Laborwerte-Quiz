<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Joker Quiz</title>

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }
    .hidden {
      display: none;
    }
    .header {
      text-align: center;
      margin-top: 6px;
    }
    .logo {
      width: 120px;
      max-width: 38vw;
      height: auto;
      display: block;
      margin: 10px auto 10px;
      object-fit: contain;
    }
    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 16px;
      margin-top: 18px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    @media (min-width: 760px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .big-btn, .answer-btn, .nav-btn, .joker-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 18px;
      cursor: pointer;
    }
    .big-btn {
      background: #fff;
      color: #111;
      text-align: left;
    }
    .big-btn.disabled {
      background: #2b2b2b;
      color: #999;
      cursor: default;
    }
    .meta {
      margin: 14px 0;
      font-size: 17px;
      color: #ddd;
      text-align: center;
    }
    #frage {
      font-size: 26px;
      font-weight: bold;
      margin: 18px 0;
      text-align: center;
      line-height: 1.35;
    }
    .answer-btn {
      background: #fff;
      color: #111;
      margin: 10px 0;
    }
    .answer-btn.correct {
      background: #1f9d55;
      color: white;
    }
    .answer-btn.wrong {
      background: #c53030;
      color: white;
    }
    .answer-btn.disabled {
      opacity: 0.95;
      cursor: default;
    }
    .answer-btn.removed {
      visibility: hidden;
      pointer-events: none;
      height: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }
    #feedback {
      margin-top: 14px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
      min-height: 24px;
    }
    #timer {
      margin-top: 14px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    .nav-btn {
      background: #2563eb;
      color: white;
      margin-top: 14px;
    }
    .nav-btn.secondary {
      background: #444;
    }
    .joker-btn {
      background: #d4af37;
      color: #111;
      font-weight: bold;
      margin-top: 10px;
    }
    .joker-btn.used {
      background: #555;
      color: #aaa;
      cursor: default;
    }
    .small {
      color: #bbb;
      font-size: 15px;
      margin-top: 12px;
      line-height: 1.4;
      text-align: center;
    }
    #result {
      font-size: 21px;
      line-height: 1.6;
      text-align: center;
    }
    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #262626;
      color: #ddd;
      font-size: 14px;
    }
    .result-title {
      font-size: 30px;
      margin: 8px 0 0;
    }
  </style>
</head>

        <div class="badge">Joker Quiz</div>
      </div>

      <div class="card">

          <button class="big-btn disabled" type="button">

        </div>
      </div>
    </section>

    <section id="quizScreen" class="hidden">

        <img class="logo" style="width:80px" alt="Jokermütze" src="./jokerhut.jpg">

        <div id="frage"></div>
        <div id="antworten"></div>

        <button id="nextBtn" class="nav-btn hidden" onclick="nextQuestion()">Nächste Frage</button>

        <button class="nav-btn secondary" onclick="goHome()">Zur Startseite</button>
      </div>
    </section>

    <section id="resultScreen" class="hidden">

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareQuestions(questionList) {
      const shuffledQuestions = shuffleArray(questionList);
      return shuffledQuestions.map(q => {
        const frageText = Array.isArray(q.frage)
          ? q.frage[Math.floor(Math.random() * q.frage.length)]
          : q.frage;

        const options = q.antworten.map((text, idx) => ({
          text,
          originalIndex: idx
        }));

        const mixedOptions = shuffleArray(options);
        const newCorrectIndex = mixedOptions.findIndex(opt => opt.originalIndex === q.richtig);

        return {
          frage: frageText,
          antworten: mixedOptions.map(opt => opt.text),
          richtig: newCorrectIndex
        };
      });
    }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startModule(key) {
      const mod = modules[key];
      if (!mod || !mod.questions.length) return;

      activeModuleKey = key;
      aktiveFragen = prepareQuestions(mod.questions);
      falschBeantwortet = [];
      index = 0;
      punktzahl = 0;
      gesamtGestellt = 0;
      firstRoundCount = aktiveFragen.length;
      jokerUsed = false;

      const jokerBtn = document.getElementById("jokerBtn");
      jokerBtn.disabled = false;
      jokerBtn.classList.remove("used");

      document.getElementById("moduleBadge").innerText = mod.title;
      show("quizScreen");
      zeigeFrage();
    }

    function updateProgress() {
      document.getElementById("progress").innerText =
        "Direkt richtig: " + punktzahl + " von " + firstRoundCount +
        " | Aktuelle Runde: Frage " + (index + 1) + " von " + aktiveFragen.length;
    }

    function zeigeFrage() {
      if (index >= aktiveFragen.length) {
        if (falschBeantwortet.length > 0) {
          aktiveFragen = shuffleArray([...falschBeantwortet]);
          falschBeantwortet = [];
          index = 0;
          alert("Jetzt kommen die noch nicht sicheren Fragen erneut.");
        } else {
          quizBeenden();
          return;
        }
      }

      beantwortet = false;
      zeit = modules[activeModuleKey].time;
      clearInterval(timer);
      gesamtGestellt++;

      document.getElementById("feedback").innerText = "";
      document.getElementById("nextBtn").classList.add("hidden");

      const frageObj = aktiveFragen[index];
      document.getElementById("frage").innerText = frageObj.frage;

      const antwortenBox = document.getElementById("antworten");
      antwortenBox.innerHTML = "";

      frageObj.antworten.forEach((antwort, i) => {
        const btn = document.createElement("button");
        btn.innerText = antwort;
        btn.className = "answer-btn";
        btn.dataset.index = i;
        btn.onclick = () => pruefeAntwort(i);
        antwortenBox.appendChild(btn);
      });

      document.getElementById("timer").innerText = "Zeit: " + zeit;
      updateProgress();

      timer = setInterval(() => {
        zeit--;
        document.getElementById("timer").innerText = "Zeit: " + zeit;
        if (zeit <= 0) {
          clearInterval(timer);
          zeitAbgelaufen();
        }
      }, 1000);
    }

    function pruefeAntwort(auswahl) {
      if (beantwortet) return;
      beantwortet = true;
      clearInterval(timer);

      const frageObj = aktiveFragen[index];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach((btn, i) => {
        btn.classList.add("disabled");
        btn.disabled = true;
        if (i === frageObj.richtig) btn.classList.add("correct");
      });

      if (auswahl === frageObj.richtig) {
        document.getElementById("feedback").innerText = "Richtig";
        punktzahl++;
      } else {
        buttons[auswahl].classList.add("wrong");
        document.getElementById("feedback").innerText = "Falsch";
        falschBeantwortet.push(frageObj);
      }

      updateProgress();
      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function zeitAbgelaufen() {
      if (beantwortet) return;
      beantwortet = true;

      const frageObj = aktiveFragen[index];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach((btn, i) => {
        btn.classList.add("disabled");
        btn.disabled = true;
        if (i === frageObj.richtig) btn.classList.add("correct");
      });

      document.getElementById("feedback").innerText = "Zeit abgelaufen";
      falschBeantwortet.push(frageObj);
      updateProgress();
      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function useJoker() {
      if (jokerUsed || beantwortet) return;

      const frageObj = aktiveFragen[index];
      const buttons = [...document.querySelectorAll(".answer-btn")];
      const falscheButtons = buttons.filter((btn, i) => i !== frageObj.richtig && !btn.classList.contains("removed"));

      if (falscheButtons.length === 0) return;

      const auswahl = falscheButtons[Math.floor(Math.random() * falscheButtons.length)];
      auswahl.classList.add("removed");

      jokerUsed = true;
      const jokerBtn = document.getElementById("jokerBtn");
      jokerBtn.disabled = true;
      jokerBtn.classList.add("used");
    }

    function nextQuestion() {
      index++;
      zeigeFrage();
    }

    function quizBeenden() {
      clearInterval(timer);
      const result = document.getElementById("result");
      const prozent = Math.round((punktzahl / firstRoundCount) * 100);

      result.innerHTML =
        "<p>Modul: <strong>" + modules[activeModuleKey].title + "</strong></p>" +
        "<p>Direkt richtig beantwortet: " + punktzahl + " von " + firstRoundCount + "</p>" +
        "<p>Ergebnis im ersten Durchgang: " + prozent + " Prozent</p>" +
        "<p>Insgesamt gestellte Fragen inklusive Wiederholungen: " + gesamtGestellt + "</p>" +
        "<p>Fragenfolge und Antwortreihenfolge werden bei jedem Neustart neu gemischt.</p>" +
        "<p>Der Joker konnte pro Durchlauf einmal verwendet werden.</p>";

      show("resultScreen");
    }

    function restartCurrentModule() {
      if (!activeModuleKey) {
        show("startScreen");
        return;
      }
      startModule(activeModuleKey);
    }

    function goHome() {
      clearInterval(timer);
      show("startScreen");
    }
  </script>
</body>
</html>
